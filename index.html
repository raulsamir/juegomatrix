<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               height=device-height,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>Escape de la Matrix</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
}

/* ===== CANVAS SCALE ===== */
#wrapper {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

canvas {
    height: 100%;
    width: auto;
    max-width: 100%;
}

/* ===== UI LAYER ===== */
#ui {
    position: fixed;
    inset: 0;
    pointer-events: none; /* solo botones reciben eventos */
}

/* HUD */
#hud {
    position: absolute;
    top: 16px;
    left: 16px;
    color: #00ff00;
    font-size: 24px;
}

/* BOTONES */
.control-btn {
    position: absolute;
    bottom: 24px;

    width: 88px;
    height: 88px;

    border-radius: 14px;
    border: 2px solid #00ff00;
    background: rgba(0,0,0,0.6);
    color: #00ff00;
    font-size: 40px;

    display: flex;
    align-items: center;
    justify-content: center;

    pointer-events: auto;
    user-select: none;
    touch-action: none;
}

#left { left: 24px; }
#right { right: 24px; }

/* GAME OVER */
#gameOver {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    color: #00ff00;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-size: 36px;
    z-index: 20;
}
</style>
</head>

<body>

<div id="ui">
    <div id="hud">TIEMPO: <span id="score">0</span></div>

    <div id="left" class="control-btn">◀</div>
    <div id="right" class="control-btn">▶</div>
</div>

<div id="gameOver">
    <div>LA MATRIX TE ATRAPÓ</div>
    <button onclick="location.reload()">REINTENTAR</button>
</div>

<div id="wrapper">
    <canvas id="game" width="1080" height="1920"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ===== MATRIX RAIN ===== */
const fontSize = 20;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const c = Math.random() > 0.5 ? "0" : "1";
        ctx.fillText(c, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.97) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}

/* ===== PLAYER ===== */
const playerImg = new Image();
playerImg.src = "player.png";

const player = {
    w: 220,
    h: 360,
    x: canvas.width / 2 - 110,
    y: canvas.height - 420,
    speed: 10
};

/* ===== CONTROLS ===== */
let moveLeft = false;
let moveRight = false;

function prevent(e){ e.preventDefault(); }

const leftBtn = document.getElementById("left");
const rightBtn = document.getElementById("right");

leftBtn.addEventListener("touchstart", e => { prevent(e); moveLeft = true; });
leftBtn.addEventListener("touchend",   e => { prevent(e); moveLeft = false; });

rightBtn.addEventListener("touchstart", e => { prevent(e); moveRight = true; });
rightBtn.addEventListener("touchend",   e => { prevent(e); moveRight = false; });

/* ===== ENEMIES ===== */
const enemies = [];

function spawnEnemy() {
    enemies.push({
        x: Math.random() * (canvas.width - 80),
        y: -80,
        s: 80,
        v: 6 + Math.random() * 3
    });
}

/* ===== GAME LOOP ===== */
let score = 0;
let running = true;

function update() {
    if (!running) return;

    if (moveLeft && player.x > 0) player.x -= player.speed;
    if (moveRight && player.x + player.w < canvas.width) player.x += player.speed;

    enemies.forEach(e => {
        e.y += e.v;
        if (
            e.x < player.x + player.w &&
            e.x + e.s > player.x &&
            e.y < player.y + player.h &&
            e.y + e.s > player.y
        ) {
            running = false;
            document.getElementById("gameOver").style.display = "flex";
        }
    });

    score++;
    document.getElementById("score").textContent = score;
}

function draw() {
    drawMatrix();
    ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
    ctx.fillStyle = "red";
    enemies.forEach(e => ctx.fillRect(e.x, e.y, e.s, e.s));
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

setInterval(spawnEnemy, 900);
loop();
</script>

</body>
</html>
